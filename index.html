<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>73㎡ 확장형 홈 스타일러</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <button id="panel-toggle" title="패널 열기/닫기">☰</button>
    <aside class="panel">
      <h1>73㎡ 확장형 홈 스타일러</h1>
      <p class="summary">
        73㎡ 확장형 · 5개 구역 평면 기반 3D 홈 스타일러
      </p>

      <section>
        <h2>가구 선택</h2>

        <p class="cat-label">거실</p>
        <div class="buttons">
          <button data-furniture="sofa">소파</button>
          <button data-furniture="armchair">1인소파</button>
          <button data-furniture="coffeeTable">커피테이블</button>
          <button data-furniture="tvStand">TV장</button>
        </div>

        <p class="cat-label">침실</p>
        <div class="buttons">
          <button data-furniture="bed">더블침대</button>
          <button data-furniture="nightstand">협탁</button>
          <button data-furniture="wardrobe">옷장</button>
          <button data-furniture="dresser">화장대</button>
        </div>

        <p class="cat-label">주방 · 식당</p>
        <div class="buttons">
          <button data-furniture="diningTable">식탁(4인)</button>
          <button data-furniture="diningChair">식탁의자</button>
          <button data-furniture="fridge">냉장고</button>
        </div>

        <p class="cat-label">서재</p>
        <div class="buttons">
          <button data-furniture="desk">책상</button>
          <button data-furniture="bookshelf">책장</button>
        </div>

        <p class="cat-label">기타</p>
        <div class="buttons">
          <button data-furniture="washer">세탁기</button>
          <button data-furniture="shoeCabinet">신발장</button>
        </div>
      </section>

      <section>
        <h2>사용 방법</h2>
        <ol>
          <li>가구를 선택합니다.</li>
          <li>바닥을 클릭하면 배치됩니다.</li>
          <li>배치된 가구를 드래그해 이동합니다.</li>
          <li><kbd>R</kbd> 키로 마지막 가구를 90° 회전합니다.</li>
        </ol>
      </section>

      <section>
        <h2>73㎡ 확장형 평면 구성</h2>
        <ul>
          <li><span class="dot" style="background:#ede8de"></span> 거실 (발코니 확장)</li>
          <li><span class="dot" style="background:#e4ede0"></span> 주방 · 식당</li>
          <li><span class="dot" style="background:#e8e2ee"></span> 안방</li>
          <li><span class="dot" style="background:#dfe8f0"></span> 침실 2</li>
          <li><span class="dot" style="background:#edeae2"></span> 침실 3</li>
        </ul>
      </section>

      <button id="reset">초기화</button>
      <p id="status">현재 선택: 없음</p>
    </aside>

    <main>
      <canvas id="scene"></canvas>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
